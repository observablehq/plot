    <rect x="255.6" y="20" width="127.8" height="59" fill="rgb(149, 251, 81)"></rect>
    <rect x="383.4" y="20" width="127.8" height="59" fill="rgb(255, 130, 29)"></rect>
    <rect x="511.2" y="20" width="127.8" height="59" fill="rgb(144, 12, 0)"></rect>
  </g>
