<svg class="plot" fill="currentColor" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" width="640" height="100" viewBox="0 0 640 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    :where(.plot) {
      --plot-background: white;
      display: block;
      height: auto;
      height: intrinsic;
      max-width: 100%;
    }

    :where(.plot text),
    :where(.plot tspan) {
      white-space: pre;
    }
  </style>
  <g aria-label="x-axis tick" aria-hidden="true" fill="none" stroke="currentColor" transform="translate(0.5,0)">
    <path transform="translate(20,70)" d="M0,0L0,6"></path>
    <path transform="translate(80,70)" d="M0,0L0,6"></path>
    <path transform="translate(140,70)" d="M0,0L0,6"></path>
    <path transform="translate(200,70)" d="M0,0L0,6"></path>
    <path transform="translate(260,70)" d="M0,0L0,6"></path>
    <path transform="translate(320,70)" d="M0,0L0,6"></path>
    <path transform="translate(380,70)" d="M0,0L0,6"></path>
    <path transform="translate(440,70)" d="M0,0L0,6"></path>
    <path transform="translate(500,70)" d="M0,0L0,6"></path>
    <path transform="translate(560,70)" d="M0,0L0,6"></path>
    <path transform="translate(620,70)" d="M0,0L0,6"></path>
  </g>
  <g aria-label="x-axis tick label" font-variant="tabular-nums" transform="translate(0.5,9.5)">
    <text y="0.71em" transform="translate(20,70)">0.0</text>
    <text y="0.71em" transform="translate(80,70)">0.5</text>
    <text y="0.71em" transform="translate(140,70)">1.0</text>
    <text y="0.71em" transform="translate(200,70)">1.5</text>
    <text y="0.71em" transform="translate(260,70)">2.0</text>
    <text y="0.71em" transform="translate(320,70)">2.5</text>
    <text y="0.71em" transform="translate(380,70)">3.0</text>
    <text y="0.71em" transform="translate(440,70)">3.5</text>
    <text y="0.71em" transform="translate(500,70)">4.0</text>
    <text y="0.71em" transform="translate(560,70)">4.5</text>
    <text y="0.71em" transform="translate(620,70)">5.0</text>
  </g>
  <g aria-label="rect">
    <rect x="20" y="20" width="120" height="50" fill="rgb(35, 23, 27)"></rect>
    <rect x="140" y="20" width="120" height="50" fill="rgb(38, 188, 225)"></rect>
    <rect x="260" y="20" width="120" height="50" fill="rgb(149, 251, 81)"></rect>
    <rect x="380" y="20" width="120" height="50" fill="rgb(255, 130, 29)"></rect>
    <rect x="500" y="20" width="120" height="50" fill="rgb(144, 12, 0)"></rect>
  </g>
  <g aria-label="tip" fill="var(--plot-background)" stroke="currentColor" pointer-events="none" text-anchor="start" transform="translate(0.5,0.5)"></g>
</svg>