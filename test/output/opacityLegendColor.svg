<svg class="plot-ramp" font-family="system-ui, sans-serif" font-size="10" width="240" height="50" viewBox="0 0 240 50" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    :where(.plot-ramp) {
      display: block;
      height: auto;
      height: intrinsic;
      max-width: 100%;
      overflow: visible;
    }

    :where(.plot-ramp text) {
      white-space: pre;
    }
  </style>
  <rect x="0" y="18" width="240" height="10" fill="url(#plot-filter-7)"></rect>
  <image x="0" y="18" width="240" height="10" preserveAspectRatio="none" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAABCAYAAAAxWXB3AAAABmJLR0QA/wD/AP+gvaeTAAAAWUlEQVQ4jd2SSwoAIAhEx+5/6DZCg/gZqFWBoCZPRzScZwCW+8tjozjmO6tqJxbnlX4K57Y2m3n6Z44h36eqMXK4X2SrO+rmV7hZbeVPepR7UrX9pOWllewNAjMBAXvLNnYAAAAASUVORK5CYII=" filter="url(#plot-filter-8)"></image>
  <g transform="translate(0,28)" fill="none" text-anchor="middle" font-variant="tabular-nums">
    <g class="tick" opacity="1" transform="translate(0.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">0</text>
    </g>
    <g class="tick" opacity="1" transform="translate(48.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">2</text>
    </g>
    <g class="tick" opacity="1" transform="translate(96.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">4</text>
    </g>
    <g class="tick" opacity="1" transform="translate(144.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">6</text>
    </g>
    <g class="tick" opacity="1" transform="translate(192.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">8</text>
    </g>
    <g class="tick" opacity="1" transform="translate(240.5,0)">
      <line stroke="currentColor" y2="6" y1="-10"></line>
      <text fill="currentColor" y="9" dy="0.71em">10</text>
    </g>
  </g>
  <text x="0" y="12" fill="currentColor" font-weight="bold">Linear</text>
  <pattern id="plot-filter-7" y="18" width="10" height="10" patternUnits="userSpaceOnUse">
    <path d="M0,0h5v5H0ZM5,5h5v5H5Z" fill="color-mix(in srgb, var(--plot-background), currentColor 20%)"></path>
  </pattern>
  <filter id="plot-filter-8">
    <feFlood flood-color="steelblue"></feFlood>
    <feComposite in2="SourceGraphic" operator="in"></feComposite>
  </filter>
</svg>